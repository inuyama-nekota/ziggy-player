    <meta name="apple-mobile-web-app-title" content="ZIGGY PLAYER" />
    <meta name="description" content="STAY GOLDとGLORIAを楽しむ、端末内保存型の個人用プレイヤー" />
    <style>
:root {
  color-scheme: dark;
  --background: #08080a;
  --surface: #111116;
  --surface-soft: #19191f;
  --line: rgba(255, 255, 255, 0.1);
  --text: #f6f4ef;
  --muted: #8e8d94;
  --gold: #e9b84a;
  --gold-bright: #ffd873;
  --danger: #ff8a80;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
  background: var(--background);
}

* {
  box-sizing: border-box;
}

html,
body {
  min-height: 100%;
  margin: 0;
  overscroll-behavior: none;
  background:
    radial-gradient(circle at 50% -10%, rgba(233, 184, 74, 0.13), transparent 34rem),
    var(--background);
  color: var(--text);
}

body {
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}

button,
input {
  font: inherit;
}

button {
  color: inherit;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.app-shell {
  width: min(100%, 34rem);
  min-height: 100dvh;
  margin: 0 auto;
  padding: calc(var(--safe-top) + 1rem) 1.25rem calc(var(--safe-bottom) + 1rem);
  display: flex;
  flex-direction: column;
  gap: 1.15rem;
}

.app-header,
.setup-header,
.lyrics-heading,
footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.app-header h1,
.setup-header h2,
.player-section h2 {
  margin: 0;
}

.app-header h1 {
  font-size: clamp(1.7rem, 8vw, 2.3rem);
  line-height: 1;
  letter-spacing: 0.025em;
}

.app-header h1 span {
  color: var(--gold);
}

.eyebrow,
.section-label {
  margin: 0 0 0.35rem;
  color: var(--muted);
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.18em;
}

.icon-button {
  width: 2.75rem;
  height: 2.75rem;
  border: 1px solid var(--line);
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.045);
  font-size: 1.25rem;
}

.icon-button:active,
.control-button:active,
.save-button:active,
.file-picker:active {
  transform: scale(0.96);
}

.reel-section,
.player-section,
.lyrics-section {
  border: 1px solid var(--line);
  border-radius: 1.25rem;
  background: linear-gradient(150deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.015));
  box-shadow: 0 1.2rem 3rem rgba(0, 0, 0, 0.22);
}

.reel-section {
  padding: 1rem 1rem 0.75rem;
}

.song-reel {
  position: relative;
  height: 9.75rem;
  overflow: hidden;
  touch-action: pan-x;
  outline: none;
  cursor: ns-resize;
}

.reel-lines {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-rows: repeat(3, 1fr);
  align-items: center;
  z-index: 2;
}

.reel-line {
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 0;
  text-align: center;
  white-space: nowrap;
  transition: color 180ms ease, opacity 180ms ease, transform 180ms ease;
}

.reel-side {
  color: var(--muted);
  font-size: 0.9rem;
  opacity: 0.48;
  transform: scale(0.92);
}

.reel-current {
  color: var(--text);
  font-size: clamp(1.35rem, 7vw, 1.8rem);
  font-weight: 800;
  letter-spacing: 0.025em;
  text-shadow: 0 0 1.2rem rgba(233, 184, 74, 0.22);
}

.reel-selection {
  position: absolute;
  top: 33.333%;
  right: 0.2rem;
  bottom: 33.333%;
  left: 0.2rem;
  z-index: 1;
  border-top: 1px solid rgba(233, 184, 74, 0.5);
  border-bottom: 1px solid rgba(233, 184, 74, 0.5);
  background: linear-gradient(90deg, transparent, rgba(233, 184, 74, 0.07), transparent);
}

.reel-selection::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 0;
  width: 0;
  height: 0;
  border-top: 0.3rem solid transparent;
  border-bottom: 0.3rem solid transparent;
  border-left: 0.45rem solid var(--gold);
  transform: translateY(-50%);
}

.reel-fade {
  position: absolute;
  right: 0;
  left: 0;
  height: 34%;
  z-index: 3;
  pointer-events: none;
}

.reel-fade-top {
  top: 0;
  background: linear-gradient(var(--surface), transparent);
}

.reel-fade-bottom {
  bottom: 0;
  background: linear-gradient(transparent, var(--surface));
}

.reel-lines.move-up {
  animation: reel-move-up 240ms cubic-bezier(0.22, 0.75, 0.25, 1);
}

.reel-lines.move-down {
  animation: reel-move-down 240ms cubic-bezier(0.22, 0.75, 0.25, 1);
}

@keyframes reel-move-up {
  from { transform: translateY(1.15rem); opacity: 0.68; }
  to { transform: translateY(0); opacity: 1; }
}

@keyframes reel-move-down {
  from { transform: translateY(-1.15rem); opacity: 0.68; }
  to { transform: translateY(0); opacity: 1; }
}

.reel-hint {
  margin: 0.2rem 0 0;
  color: var(--muted);
  font-size: 0.7rem;
  text-align: center;
}

.player-section {
  padding: 1rem 1.1rem 1.1rem;
  text-align: center;
}

.player-section h2 {
  min-height: 1.65rem;
  font-size: 1.15rem;
  letter-spacing: 0.045em;
}

.timeline {
  display: grid;
  grid-template-columns: 2.8rem 1fr 2.8rem;
  align-items: center;
  gap: 0.5rem;
  margin-top: 0.8rem;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
  font-size: 0.7rem;
}

#seekBar {
  width: 100%;
  height: 1.5rem;
  margin: 0;
  accent-color: var(--gold);
}

.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1.35rem;
  margin-top: 0.6rem;
}

.control-button {
  display: grid;
  place-items: center;
  border: 0;
  border-radius: 50%;
  transition: transform 100ms ease, background 150ms ease;
}

.control-button.secondary {
  width: 3.25rem;
  height: 3.25rem;
  background: var(--surface-soft);
  font-size: 1.2rem;
}

.control-button.primary {
  width: 4.2rem;
  height: 4.2rem;
  padding-left: 0.18rem;
  background: var(--gold);
  color: #17120a;
  box-shadow: 0 0.8rem 2rem rgba(233, 184, 74, 0.2);
  font-size: 1.45rem;
}

.control-button.primary.is-playing {
  padding-left: 0;
}

.player-message {
  min-height: 1rem;
  margin: 0.55rem 0 0;
  color: var(--muted);
  font-size: 0.72rem;
}

.player-message.error,
.setup-message.error {
  color: var(--danger);
}

.lyrics-section {
  padding: 1rem;
}

.lyrics-heading span {
  color: var(--gold);
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.12em;
}

.lyrics-window {
  height: 9rem;
  overflow: hidden;
  border-radius: 0.9rem;
  background: rgba(0, 0, 0, 0.18);
}

.lyrics-stack {
  height: 100%;
  display: grid;
  grid-template-rows: repeat(3, 1fr);
}

.lyrics-stack.slide-up {
  animation: lyric-slide-up 260ms ease-out;
}

.lyrics-stack.slide-down {
  animation: lyric-slide-down 260ms ease-out;
}

.lyrics-stack.fade {
  animation: lyric-fade 220ms ease-out;
}

@keyframes lyric-slide-up {
  from { transform: translateY(0.7rem); opacity: 0.35; }
  to { transform: translateY(0); opacity: 1; }
}

@keyframes lyric-slide-down {
  from { transform: translateY(-0.7rem); opacity: 0.35; }
  to { transform: translateY(0); opacity: 1; }
}

@keyframes lyric-fade {
  from { opacity: 0.25; }
  to { opacity: 1; }
}

.lyric-line {
  min-width: 0;
  margin: 0;
  padding: 0 0.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  text-align: center;
  white-space: nowrap;
}

.lyric-side {
  color: var(--muted);
  font-size: 0.78rem;
  opacity: 0.63;
}

.lyric-current {
  color: var(--text);
  font-size: 1rem;
  font-weight: 800;
}

.lyric-line.is-long {
  font-size: 0.78rem;
  letter-spacing: -0.035em;
}

.lyric-line.is-very-long {
  font-size: 0.66rem;
  letter-spacing: -0.055em;
}

footer {
  margin-top: auto;
  padding: 0 0.2rem;
  color: var(--muted);
  font-size: 0.65rem;
}

.privacy-mark {
  color: #80c9a4;
}

.setup-overlay {
  position: fixed;
  inset: 0;
  z-index: 20;
  display: none;
  align-items: flex-end;
  justify-content: center;
  background: rgba(0, 0, 0, 0.72);
  backdrop-filter: blur(0.35rem);
}

.setup-overlay.is-open {
  display: flex;
}

.setup-sheet {
  width: min(100%, 34rem);
  max-height: calc(100dvh - var(--safe-top) - 0.7rem);
  overflow-y: auto;
  padding: 0.65rem 1.25rem calc(var(--safe-bottom) + 1.25rem);
  border: 1px solid var(--line);
  border-bottom: 0;
  border-radius: 1.5rem 1.5rem 0 0;
  background: #121216;
  box-shadow: 0 -2rem 5rem rgba(0, 0, 0, 0.45);
  animation: sheet-in 260ms cubic-bezier(0.22, 0.75, 0.25, 1);
}

@keyframes sheet-in {
  from { transform: translateY(2.5rem); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.setup-grabber {
  width: 2.6rem;
  height: 0.28rem;
  margin: 0 auto 0.8rem;
  border-radius: 999px;
  background: #46464d;
}

.setup-header h2 {
  font-size: 1.35rem;
}

.setup-intro {
  margin: 1rem 0;
  color: #c2c0c5;
  font-size: 0.82rem;
  line-height: 1.65;
}

.setup-songs {
  display: grid;
  gap: 0.8rem;
}

.setup-song {
  padding: 0.85rem;
  border: 1px solid var(--line);
  border-radius: 1rem;
  background: rgba(255, 255, 255, 0.025);
}

.setup-song h3 {
  margin: 0 0 0.65rem;
  color: var(--gold-bright);
  font-size: 0.95rem;
}

.file-pickers {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.55rem;
}

.file-picker {
  min-width: 0;
  padding: 0.68rem;
  border-radius: 0.72rem;
  background: var(--surface-soft);
  cursor: pointer;
  transition: transform 100ms ease;
}

.file-picker-label,
.file-name {
  display: block;
}

.file-picker-label {
  font-size: 0.78rem;
  font-weight: 700;
}

.file-name {
  margin-top: 0.28rem;
  overflow: hidden;
  color: var(--muted);
  font-size: 0.64rem;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.file-name.stored {
  color: #80c9a4;
}

.file-picker input {
  position: absolute;
  width: 1px;
  height: 1px;
  opacity: 0;
  pointer-events: none;
}

.setup-message {
  min-height: 1.15rem;
  margin: 0.8rem 0 0.4rem;
  color: #80c9a4;
  font-size: 0.75rem;
  text-align: center;
}

.save-button {
  width: 100%;
  min-height: 3.25rem;
  border: 0;
  border-radius: 0.85rem;
  background: var(--gold);
  color: #17120a;
  font-weight: 800;
  transition: transform 100ms ease;
}

.save-button:disabled {
  opacity: 0.52;
}

.setup-note {
  margin: 0.65rem 0 0;
  color: var(--muted);
  font-size: 0.65rem;
  text-align: center;

@media (min-width: 42rem) and (min-height: 48rem) {
  .app-shell {
    justify-content: center;
    padding-top: calc(var(--safe-top) + 2rem);
    padding-bottom: calc(var(--safe-bottom) + 2rem);
  }
}

@media (max-height: 43rem) {
  .app-shell {
    gap: 0.7rem;
  }

  .song-reel {
    height: 7.8rem;

    height: 7.5rem;
  }

  .reel-section,
  .player-section,
  .lyrics-section {
    padding-top: 0.75rem;
    padding-bottom: 0.75rem;
  }

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    scroll-behavior: auto !important;
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

    <script>

// Repair build: remove stale cached versions without touching saved songs.
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.getRegistrations().then((items) => items.forEach((item) => item.unregister()));
}
if ("caches" in window) {
  caches.keys().then((keys) => Promise.all(keys.map((key) => caches.delete(key))));
}

const TIME_TAG = /\[(\d{1,3}):(\d{2})(?:[.:](\d{1,3}))?\]/g;
const METADATA_TAG = /^\s*\[([a-zA-Z]+):(.*)\]\s*$/;

function fractionToMilliseconds(value = "") {
  if (!value) return 0;
  if (value.length === 1) return Number(value) * 100;
  if (value.length === 2) return Number(value) * 10;
  return Number(value.slice(0, 3));
}

function parseLrc(source) {
  if (typeof source !== "string") {
    throw new TypeError("LRC data must be text.");
  }

  const metadata = {};
  const entries = [];
  let offset = 0;
  const lines = source.replace(/^\uFEFF/, "").split(/\r?\n/);

  for (const rawLine of lines) {
    const metadataMatch = rawLine.match(METADATA_TAG);
    if (metadataMatch && !/^\d+$/.test(metadataMatch[1])) {
      const key = metadataMatch[1].toLowerCase();
      const value = metadataMatch[2].trim();
      metadata[key] = value;
      if (key === "offset" && Number.isFinite(Number(value))) {
        offset = Number(value);
      }
      continue;
    }

    const timestamps = [...rawLine.matchAll(TIME_TAG)];
    if (timestamps.length === 0) continue;

    const text = rawLine
      .replace(TIME_TAG, "")
      .replace(/<\d{1,3}:\d{2}(?:[.:]\d{1,3})?>/g, "")
      .trim();

    for (const match of timestamps) {
      const minutes = Number(match[1]);
      const seconds = Number(match[2]);
      if (seconds >= 60) continue;
      const timeMs = minutes * 60_000 + seconds * 1_000 + fractionToMilliseconds(match[3]);
      entries.push({ timeMs, text });
    }
  }

  const adjusted = entries
    .map((entry) => ({ ...entry, timeMs: Math.max(0, entry.timeMs + offset) }))
    .sort((a, b) => a.timeMs - b.timeMs)
    .filter((entry, index, all) => index === 0 || entry.timeMs !== all[index - 1].timeMs || entry.text !== all[index - 1].text);

  if (adjusted.length === 0) {
    throw new Error("時刻付きの歌詞行が見つかりませんでした。");
  }

  return { metadata, entries: adjusted };
}

function findLyricIndex(entries, timeMs) {
  let low = 0;
  let high = entries.length - 1;
  let answer = -1;

  while (low <= high) {
    const middle = Math.floor((low + high) / 2);
    if (entries[middle].timeMs <= timeMs) {
      answer = middle;
      low = middle + 1;
    } else {
      high = middle - 1;
    }
  }

  return answer;
}

const SONGS = [
  { id: "stay-gold", title: "STAY GOLD", artist: "ZIGGY" },
  { id: "gloria", title: "GLORIA", artist: "ZIGGY" },
];

const DB_NAME = "ziggy-player-private-media";
const DB_VERSION = 1;
const STORE_NAME = "songs";

const $ = (id) => document.getElementById(id);
const audio = $("audioPlayer");
const reel = $("songReel");
const reelLines = $("reelLines");
const playButton = $("playButton");
const seekBar = $("seekBar");
const setupSheet = $("setupSheet");

const state = {
  songIndex: 0,
  lyricIndex: -1,
  lyrics: [],
  objectUrl: null,
  pendingFiles: new Map(),
  loadToken: 0,
  allSongsReady: false,
  touchStartY: null,
};

function openDatabase() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onupgradeneeded = () => {
      if (!request.result.objectStoreNames.contains(STORE_NAME)) {
        request.result.createObjectStore(STORE_NAME, { keyPath: "id" });
      }
    };
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

async function withStore(mode, callback) {
  const database = await openDatabase();
  return new Promise((resolve, reject) => {
    const transaction = database.transaction(STORE_NAME, mode);
    const store = transaction.objectStore(STORE_NAME);
    let result;

    try {
      result = callback(store);
    } catch (error) {
      database.close();
      reject(error);
      return;
    }

    transaction.oncomplete = () => {
      database.close();
      resolve(result);
    };
    transaction.onerror = () => {
      database.close();
      reject(transaction.error);
    };
    transaction.onabort = () => {
      database.close();
      reject(transaction.error || new Error("保存が中断されました。"));
    };
  });
}

async function getSongRecord(id) {
  const database = await openDatabase();
  return new Promise((resolve, reject) => {
    const transaction = database.transaction(STORE_NAME, "readonly");
    const request = transaction.objectStore(STORE_NAME).get(id);
    request.onsuccess = () => resolve(request.result || null);
    request.onerror = () => reject(request.error);
    transaction.oncomplete = () => database.close();
    transaction.onerror = () => database.close();
  });
}

async function saveSongRecord(record) {
  await withStore("readwrite", (store) => store.put(record));
}

function normalizeIndex(index) {
  return (index + SONGS.length) % SONGS.length;
}

function renderReel(direction = null) {
  const previous = SONGS[normalizeIndex(state.songIndex - 1)];
  const current = SONGS[state.songIndex];
  const next = SONGS[normalizeIndex(state.songIndex + 1)];

  $("reelPrevious").textContent = previous.title;
  $("reelCurrent").textContent = current.title;
  $("reelCurrent").setAttribute("aria-label", `${current.title}、選択中`);
  $("reelNext").textContent = next.title;
  $("nowPlayingTitle").textContent = current.title;

  if (direction) {
    reelLines.classList.remove("move-up", "move-down");
    void reelLines.offsetWidth;
    reelLines.classList.add(direction === "next" ? "move-up" : "move-down");
  }
}

function setMessage(text = "", isError = false) {
  const message = $("playerMessage");
  message.textContent = text;
  message.classList.toggle("error", isError);
}

function setSetupMessage(text = "", isError = false) {
  const message = $("setupMessage");
  message.textContent = text;
  message.classList.toggle("error", isError);
}

function updatePlayButton() {
  const isPlaying = !audio.paused && !audio.ended;
  playButton.textContent = isPlaying ? "Ⅱ" : "▶";
  playButton.setAttribute("aria-label", isPlaying ? "一時停止" : "再生");
  playButton.classList.toggle("is-playing", isPlaying);
}

function formatTime(seconds) {
  if (!Number.isFinite(seconds) || seconds < 0) return "0:00";
  const minutes = Math.floor(seconds / 60);
  const rest = Math.floor(seconds % 60).toString().padStart(2, "0");
  return `${minutes}:${rest}`;
}

function updateTimeline() {
  const duration = Number.isFinite(audio.duration) ? audio.duration : 0;
  const current = Number.isFinite(audio.currentTime) ? audio.currentTime : 0;
  $("currentTime").textContent = formatTime(current);
  $("durationTime").textContent = formatTime(duration);
  seekBar.value = duration > 0 ? Math.round((current / duration) * 1000) : 0;
}

function styleLyricLength(element, text) {
  element.classList.toggle("is-long", text.length > 28 && text.length <= 42);
  element.classList.toggle("is-very-long", text.length > 42);
}

function renderLyrics(nextIndex, animate = true) {
  const previousIndex = state.lyricIndex;
  state.lyricIndex = nextIndex;
  const previousText = nextIndex > 0 ? state.lyrics[nextIndex - 1]?.text || "" : "";
  const currentText = nextIndex >= 0 ? state.lyrics[nextIndex]?.text || "♪" : "♪";
  const nextText = state.lyrics[nextIndex + 1]?.text || "";
  const lines = [
    [$("previousLyric"), previousText],
    [$("currentLyric"), currentText],
    [$("nextLyric"), nextText],
  ];

  for (const [element, text] of lines) {
    element.textContent = text;
    styleLyricLength(element, text);
  }

  if (animate && previousIndex !== nextIndex) {
    $("lyricsStack").classList.remove("slide-up", "slide-down", "fade");
    void $("lyricsStack").offsetWidth;
    const difference = nextIndex - previousIndex;
    const animation = Math.abs(difference) === 1 ? (difference > 0 ? "slide-up" : "slide-down") : "fade";
    $("lyricsStack").classList.add(animation);
  }
}

function updateLyricsForTime() {
  if (state.lyrics.length === 0) return;
  const index = findLyricIndex(state.lyrics, audio.currentTime * 1000);
  if (index !== state.lyricIndex) renderLyrics(index);
}

function revokeAudioUrl() {
  if (state.objectUrl) {
    URL.revokeObjectURL(state.objectUrl);
    state.objectUrl = null;
  }
}

function updateMediaSession(song) {
  if (!("mediaSession" in navigator) || !("MediaMetadata" in window)) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title: song.title,
    artist: song.artist,
    album: "ZIGGY PLAYER",
    artwork: [
      { src: "./icons/icon-192.png", sizes: "192x192", type: "image/png" },
      { src: "./icons/icon-512.png", sizes: "512x512", type: "image/png" },
    ],
  });
}

async function loadSong(index, { autoplay = false, direction = null } = {}) {
  const normalizedIndex = normalizeIndex(index);
  const song = SONGS[normalizedIndex];
  const token = ++state.loadToken;
  const wasPlaying = !audio.paused;

  audio.pause();
  audio.currentTime = 0;
  state.songIndex = normalizedIndex;
  state.lyricIndex = -1;
  state.lyrics = [];
  updateTimeline();
  renderReel(direction);
  renderLyrics(-1, false);
  setMessage("読み込み中…");

  try {
    const record = await getSongRecord(song.id);
    if (token !== state.loadToken) return;
    if (!record?.audioBlob || !record?.lyricsText) {
      revokeAudioUrl();
      audio.removeAttribute("src");
      audio.load();
      setMessage("音源と歌詞を登録してください", true);
      openSetup();
      return;
    }

    const parsed = parseLrc(record.lyricsText);
    state.lyrics = parsed.entries;
    revokeAudioUrl();
    state.objectUrl = URL.createObjectURL(record.audioBlob);
    audio.src = state.objectUrl;
    audio.load();
    renderLyrics(-1, false);
    updateMediaSession(song);
    setMessage(autoplay || wasPlaying ? "" : "再生ボタンを押してください");

    if (autoplay || wasPlaying) {
      try {
        await audio.play();
        setMessage("");
      } catch {
        setMessage("再生ボタンを押してください");
      }
    }
  } catch (error) {
    console.error(error);
    setMessage(error.message || "曲を読み込めませんでした。", true);
  }
}

async function changeSong(delta, { autoplay = false } = {}) {
  const direction = delta > 0 ? "next" : "previous";
  await loadSong(state.songIndex + delta, { autoplay, direction });
}

async function togglePlayback() {
  if (!audio.src) {
    openSetup();
    setMessage("先に音源と歌詞を登録してください", true);
    return;
  }

  try {
    if (audio.paused) {
      await audio.play();
      setMessage("");
    } else {
      audio.pause();
    }
  } catch (error) {
    console.error(error);
    setMessage("再生できませんでした。音源を選び直してください。", true);
  }
}

function buildSetupRows() {
  const container = $("setupSongs");
  const template = $("setupSongTemplate");
  container.replaceChildren();

  for (const song of SONGS) {
    const fragment = template.content.cloneNode(true);
    const article = fragment.querySelector(".setup-song");
    article.dataset.songId = song.id;
    fragment.querySelector("h3").textContent = song.title;

    for (const input of fragment.querySelectorAll("input[type=file]")) {
      input.dataset.songId = song.id;
      input.addEventListener("change", handleFileSelection);
    }

    container.appendChild(fragment);
  }
}

async function refreshSetupStatus() {
  let readyCount = 0;
  for (const song of SONGS) {
    const article = document.querySelector(`[data-song-id="${song.id}"]`);
    const record = await getSongRecord(song.id);
    const audioName = article.querySelector('[data-file-name="audio"]');
    const lyricsName = article.querySelector('[data-file-name="lyrics"]');
    audioName.textContent = record?.audioName || "未選択";
    lyricsName.textContent = record?.lyricsName || "未選択";
    audioName.classList.toggle("stored", Boolean(record?.audioBlob));
    lyricsName.classList.toggle("stored", Boolean(record?.lyricsText));
    if (record?.audioBlob && record?.lyricsText) readyCount += 1;
  }

  state.allSongsReady = readyCount === SONGS.length;
  $("storageStatus").textContent = state.allSongsReady ? "2曲を端末内に保存済み" : `${readyCount}/2曲を保存済み`;
  $("closeSetupButton").hidden = !state.allSongsReady;
  return state.allSongsReady;
}

function handleFileSelection(event) {
  const input = event.currentTarget;
  const file = input.files?.[0];
  if (!file) return;
  const key = `${input.dataset.songId}:${input.dataset.kind}`;
  state.pendingFiles.set(key, file);
  const article = input.closest(".setup-song");
  article.querySelector(`[data-file-name="${input.dataset.kind}"]`).textContent = file.name;
  setSetupMessage("");
}

async function decodeLyricsFile(file) {
  const bytes = await file.arrayBuffer();
  try {
    return new TextDecoder("utf-8", { fatal: true }).decode(bytes);
  } catch {
    try {
      return new TextDecoder("shift_jis").decode(bytes);
    } catch {
      return new TextDecoder().decode(bytes);
    }
  }
}

async function saveSetup() {
  const button = $("saveSetupButton");
  button.disabled = true;
  setSetupMessage("保存しています…");

  try {
    for (const song of SONGS) {
      const existing = (await getSongRecord(song.id)) || { id: song.id };
      const audioFile = state.pendingFiles.get(`${song.id}:audio`);
      const lyricsFile = state.pendingFiles.get(`${song.id}:lyrics`);
      const record = {
        ...existing,
        id: song.id,
        audioBlob: audioFile || existing.audioBlob,
        audioName: audioFile?.name || existing.audioName,
        lyricsText: lyricsFile ? await decodeLyricsFile(lyricsFile) : existing.lyricsText,
        lyricsName: lyricsFile?.name || existing.lyricsName,
        updatedAt: new Date().toISOString(),
      };

      if (record.lyricsText) parseLrc(record.lyricsText);
      if (audioFile || lyricsFile) await saveSongRecord(record);
    }

    state.pendingFiles.clear();
    const ready = await refreshSetupStatus();
    if (!ready) {
      setSetupMessage("2曲それぞれの音源と歌詞を選んでください。", true);
      return;
    }

    if (navigator.storage?.persist) {
      navigator.storage.persist().catch(() => {});
    }
    setSetupMessage("保存しました。これで次回からすぐ使えます。");
    window.setTimeout(() => {
      closeSetup();
      loadSong(state.songIndex);
    }, 500);
  } catch (error) {
    console.error(error);
    setSetupMessage(error.message || "保存できませんでした。", true);
  } finally {
    button.disabled = false;
  }
}

function openSetup() {
  setupSheet.classList.add("is-open");
  setupSheet.setAttribute("aria-hidden", "false");
  document.body.style.overflow = "hidden";
  refreshSetupStatus().catch((error) => setSetupMessage(error.message, true));
}

function closeSetup() {
  if (!state.allSongsReady) return;
  setupSheet.classList.remove("is-open");
  setupSheet.setAttribute("aria-hidden", "true");
  document.body.style.overflow = "";
}

function configureMediaSessionActions() {
  if (!("mediaSession" in navigator)) return;
  const actions = {
    play: () => audio.play(),
    pause: () => audio.pause(),
    previoustrack: () => changeSong(-1, { autoplay: true }),
    nexttrack: () => changeSong(1, { autoplay: true }),
    seekto: (details) => {
      if (typeof details.seekTime === "number") audio.currentTime = details.seekTime;
    },
  };

  for (const [action, handler] of Object.entries(actions)) {
    try {
      navigator.mediaSession.setActionHandler(action, handler);
    } catch {
      // Some iOS versions expose Media Session but not every action.
    }
  }
}

function attachEvents() {
  $("openSetupButton").addEventListener("click", openSetup);
  $("closeSetupButton").addEventListener("click", closeSetup);
  $("saveSetupButton").addEventListener("click", saveSetup);
  playButton.addEventListener("click", togglePlayback);
  $("previousButton").addEventListener("click", () => changeSong(-1));
  $("nextButton").addEventListener("click", () => changeSong(1));

  seekBar.addEventListener("input", () => {
    if (Number.isFinite(audio.duration) && audio.duration > 0) {
      audio.currentTime = (Number(seekBar.value) / 1000) * audio.duration;
      updateTimeline();
      updateLyricsForTime();
    }
  });

  audio.addEventListener("timeupdate", () => {
    updateTimeline();
    updateLyricsForTime();
  });
  audio.addEventListener("loadedmetadata", updateTimeline);
  audio.addEventListener("durationchange", updateTimeline);
  audio.addEventListener("play", updatePlayButton);
  audio.addEventListener("pause", updatePlayButton);
  audio.addEventListener("ended", () => changeSong(1, { autoplay: true }));
  audio.addEventListener("error", () => {
    if (audio.src) setMessage("この音源を再生できませんでした。設定から選び直してください。", true);
  });

  reel.addEventListener("wheel", (event) => {
    event.preventDefault();
    changeSong(event.deltaY > 0 ? 1 : -1);
  }, { passive: false });

  reel.addEventListener("keydown", (event) => {
    if (event.key === "ArrowUp") {
      event.preventDefault();
      changeSong(-1);
    }
    if (event.key === "ArrowDown") {
      event.preventDefault();
      changeSong(1);
    }
    if (event.key === "Enter" || event.key === " ") {
      event.preventDefault();
      togglePlayback();
    }
  });

  reel.addEventListener("touchstart", (event) => {
    state.touchStartY = event.changedTouches[0].clientY;
  }, { passive: true });
  reel.addEventListener("touchend", (event) => {
    if (state.touchStartY === null) return;
    const distance = state.touchStartY - event.changedTouches[0].clientY;
    state.touchStartY = null;
    if (Math.abs(distance) < 24) return;
    changeSong(distance > 0 ? 1 : -1);
  }, { passive: true });

  setupSheet.addEventListener("click", (event) => {
    if (event.target === setupSheet) closeSetup();
  });

  window.addEventListener("beforeunload", revokeAudioUrl);
}

async function registerServiceWorker() {
  if (!("serviceWorker" in navigator)) return;
  try {
    await navigator.serviceWorker.register("./service-worker.js");
  } catch (error) {
    console.warn("Offline setup was unavailable.", error);
  }
}

async function initialize() {
  buildSetupRows();
  attachEvents();
  configureMediaSessionActions();
  renderReel();
  updatePlayButton();
  updateTimeline();

  try {
    const ready = await refreshSetupStatus();
    if (ready) {
      await loadSong(0);
    } else {
      openSetup();
    }
  } catch (error) {
    console.error(error);
    setMessage("端末内の保存領域を開けませんでした。", true);
    openSetup();
  }
}

initialize();

    </script>
  </body>
